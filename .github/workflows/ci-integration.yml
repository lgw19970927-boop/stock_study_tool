name: CI — Integration Tests (Scheduled)

on:
  schedule:
    - cron: '0 3 * * *'  # 每日 UTC 03:00
  workflow_dispatch:       # 手動觸發

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pw
          MYSQL_USER: stockapp
          MYSQL_PASSWORD: test_pw
          MYSQL_DATABASE: market_data
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_USER: stockapp
      MYSQL_PASSWORD: test_pw
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest requests pandas numpy pydantic mysql-connector-python
          pip install fastapi uvicorn[standard]

      - name: Init test DB schema
        run: |
          mysql -h 127.0.0.1 -u root -ptest_root_pw < env/mysql/init.sql

      - name: Start FastAPI (background)
        run: |
          uvicorn app.app:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run integration tests
        run: |
          pytest -m integration --tb=short -q

      - name: Run smoke tests
        run: |
          RUN_SCREENING_DB_SMOKE=1 pytest -m smoke --tb=short -q

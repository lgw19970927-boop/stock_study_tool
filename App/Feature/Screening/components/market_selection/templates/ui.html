                <!-- A. 市場與頻率 -->
                <section class="panel">
                    <div class="panel-header">
                        <h2 class="panel-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                            市場與頻率
                        </h2>
                    </div>
                    <div class="filter-section">
                        <label class="filter-label">市場範圍</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" class="market-select" value="listed"> Listed Stocks(上市股票)
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" class="market-select" value="otc"> OTC Stocks(上櫃股票)
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" class="market-select" value="ipo"> IPO Stocks(興櫃股票)
                            </label>
                        </div>
                    </div>
                    <div class="filter-section">
                        <label class="filter-label">篩選頻率</label>
                        <div class="frequency-group">
                            <label class="radio-item"><input type="radio" name="frequency" value="daily"> 每日</label>
                            <label class="radio-item"><input type="radio" name="frequency" value="weekly"> 每周</label>
                            <label class="radio-item"><input type="radio" name="frequency" value="monthly"> 每月</label>
                        </div>
                    </div>
                </section>

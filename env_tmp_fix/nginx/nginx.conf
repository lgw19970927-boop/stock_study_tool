events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Upstream 設定 — 包含連接超時和重試邏輯
    upstream fastapi {
        # 如果 FastAPI 暫時不可用，nginx 會重試其他上游或稍後重新連接
        server fastapi:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # 靜態資源直接由 Nginx 提供（效能優化）
        # 開發模式：停用快取，確保前端修改立即生效（images 等媒體除外）
        location /static/ {
            alias /static/;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Feature 靜態資源（JS/CSS/HTML templates 各功能模組）
        location /feature/ {
            alias /workspace/app/feature/;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # 其餘所有請求轉發給 FastAPI
        location / {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 連接超時設定
            proxy_connect_timeout 10s;    # 连接 FastAPI 的超时（从 10s 默认值）
            proxy_send_timeout 30s;       # 发送请求的超时
            proxy_read_timeout 300s;      # 读取响应的超时（HTMX 长轮询）

            # 缓冲开启（提高性能）
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
    }
}

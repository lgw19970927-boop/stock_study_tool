<!-- 風險參數設定 UI 片段 — 由 params_block.js 控制互動 -->
<section class="rm-card rm-params-card">
    <h2 class="rm-section-title">風險參數設定</h2>
    <p class="text-muted rm-section-desc">定義核心風險胃納，系統將自動計算建議倉位。</p>
    <div class="rm-params-row">
        <!-- 初始資金（input） -->
        <div class="rm-param-field rm-param-field-capital">
            <label class="rm-param-label">
                初始資金 (Capital)
            </label>
            <div class="rm-input-wrap">
                <span class="rm-input-prefix">$</span>
                <input type="text" id="rm-capitalInput" class="rm-param-input rm-capital-input has-prefix" value="1,000,000">
            </div>
        </div>
        <!-- 單筆停損%（input） -->
        <div class="rm-param-field rm-param-field-risk">
            <label class="rm-param-label">
                單筆停損 (Risk per Trade)
            </label>
            <div class="rm-input-wrap">
                <input type="text" id="rm-riskPctInput" class="rm-param-input rm-risk-input has-suffix" value="1.0">
                <span class="rm-input-suffix">%</span>
            </div>
        </div>
        <button class="btn-primary" id="rm-recalcBtn">更新計算</button>
    </div>
</section>

<!-- 概覽卡片 UI 片段 — 由 overview_block.js 計算並填入數值 -->
<div class="rm-overview-grid">
    <!-- 帳戶總風險 -->

            <span>帳戶總風險</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="1.8"

    <!-- 全失敗停損總金額 -->

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.8"

        <div class="rm-ov-value text-danger" id="rm-ov-maxLoss">—</div>
        <div class="rm-ov-sub text-muted">最大潛在虧損</div>
    </div>
    <!-- 停損後剩餘資金 -->

            <span>停損後剩餘資金</span>

        <div class="rm-ov-value" id="rm-ov-remaining">—</div>
        <div class="rm-ov-sub text-muted">預期剩餘價值</div>
    </div>
    <!-- 資金使用率 -->
    <div class="rm-ov-card">

            <span>資金使用率</span>

                <circle cx="12" cy="12" r="10" />

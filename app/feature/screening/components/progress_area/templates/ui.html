<!-- 停止篩選可移動提示視窗 -->
<div id="stopFilterDialog" class="stop-dialog-window is-hidden fixed left-1/2 top-[30%] z-[9999] min-w-[300px] -translate-x-1/2 rounded-[10px] border border-border-color bg-bg-elevated shadow-[0_8px_32px_rgba(0,0,0,0.55)]" role="dialog" aria-modal="true">
    <div class="stop-dialog-header flex cursor-move select-none items-start justify-between gap-3 border-b border-border-color px-4 pt-3.5 pb-3" id="stopDialogHeader">
        <span class="stop-dialog-title text-[13px] font-semibold leading-[1.5] text-text-primary">確認停止篩選</span>
        <button type="button" id="btnCloseStopDialog" class="stop-dialog-close shrink-0 cursor-pointer rounded-sm border-0 bg-transparent px-1 py-0.5 leading-none text-text-muted transition-colors duration-fast hover:bg-bg-hover hover:text-text-primary" title="關閉" aria-label="關閉">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
    <div class="stop-dialog-body px-4 py-3.5">
        <p class="stop-dialog-desc mb-2.5 text-[13px] leading-[1.5] text-text-secondary">篩選尚未執行完成，請確定是否停止篩選</p>
        <label class="stop-dialog-checkbox-label flex cursor-pointer items-center gap-2 text-[13px] text-text-primary">
            <input type="checkbox" id="cbShowPartialResults" class="h-[15px] w-[15px] cursor-pointer accent-accent-primary">
            <span>顯示已執行完成的結果</span>
        </label>
    </div>
    <div class="stop-dialog-footer flex justify-end gap-2 border-t border-border-color px-4 pt-2.5 pb-3.5">
        <button type="button" id="btnConfirmStop" class="btn-dialog-confirm cursor-pointer rounded-md border-0 bg-[#ef5350] px-4 py-[7px] text-[13px] font-semibold text-white transition-colors duration-fast hover:bg-[#c62828]">確定</button>
        <button type="button" id="btnCancelStop" class="btn-dialog-cancel cursor-pointer rounded-md border border-border-color bg-transparent px-4 py-[7px] text-[13px] text-text-secondary transition-colors duration-fast hover:border-text-secondary hover:text-text-primary">取消</button>
    </div>
</div>

                <!-- D. 策略命名 -->
                <section class="panel">
                    <div class="panel-header">
                        <h2 class="panel-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
                                </path>
                            </svg>
                            策略命名
                        </h2>
                    </div>
                    <div class="filter-section">
                        <label class="filter-label">策略名稱</label>
                        <input type="text" class="select-input" id="strategyName" placeholder="輸入策略名稱">
                    </div>
                </section>

                <!-- 操作按鈕 -->
                <div class="button-group flex flex-col gap-2">
                    <button type="button" class="btn btn-ghost btn-block" id="saveOverwriteStrategy">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        儲存並覆寫
                    </button>
                    <button type="button" class="btn btn-secondary btn-block" id="saveStrategy">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        儲存為新策略
                    </button>
                    <button type="button" class="btn btn-primary btn-block" id="runFilter">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        執行篩選
                    </button>
                </div>

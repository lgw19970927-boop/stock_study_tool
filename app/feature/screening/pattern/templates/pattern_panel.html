                <!-- C. 型態篩選 -->
                <section class="panel">
                    <div class="panel-header">
                        <h2 class="panel-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="9" y1="21" x2="9" y2="9"></line>
                            </svg>
                            型態篩選
                        </h2>
                        <span class="badge badge-purple">Part 2</span>
                    </div>
                    <div class="filter-section">
                        <label class="filter-label">識別型態</label>
                        <div class="pattern-grid">
                            <label class="pattern-card">
                                <input type="checkbox" name="pattern" value="consolidation">
                                <div class="pattern-icon">
                                    <svg width="40" height="30" viewBox="0 0 40 30">
                                        <line x1="5" y1="15" x2="35" y2="15" stroke="currentColor" stroke-width="2"
                                            stroke-dasharray="3,2" />
                                        <polyline points="5,12 10,18 15,13 20,17 25,14 30,16 35,13" fill="none"
                                            stroke="currentColor" stroke-width="2" />
                                    </svg>
                                </div>
                                <span>盤整區</span>
                            </label>
                            <label class="pattern-card">
                                <input type="checkbox" name="pattern" value="w_bottom">
                                <div class="pattern-icon">
                                    <svg width="40" height="30" viewBox="0 0 40 30">
                                        <polyline points="5,8 12,25 20,12 28,25 35,8" fill="none" stroke="currentColor"
                                            stroke-width="2" />
                                    </svg>
                                </div>
                                <span>W 底</span>
                            </label>
                            <label class="pattern-card">
                                <input type="checkbox" name="pattern" value="head_shoulders_top">
                                <div class="pattern-icon">
                                    <svg width="40" height="30" viewBox="0 0 40 30">
                                        <polyline points="5,20 10,12 15,18 20,5 25,18 30,12 35,20" fill="none"
                                            stroke="currentColor" stroke-width="2" />
                                    </svg>
                                </div>
                                <span>頭肩頂</span>
                            </label>
                            <label class="pattern-card">
                                <input type="checkbox" name="pattern" value="head_shoulders_bottom">
                                <div class="pattern-icon">
                                    <svg width="40" height="30" viewBox="0 0 40 30">
                                        <polyline points="5,10 10,18 15,12 20,25 25,12 30,18 35,10" fill="none"
                                            stroke="currentColor" stroke-width="2" />
                                    </svg>
                                </div>
                                <span>頭肩底</span>
                            </label>
                            <label class="pattern-card">
                                <input type="checkbox" name="pattern" value="triangle">
                                <div class="pattern-icon">
                                    <svg width="40" height="30" viewBox="0 0 40 30">
                                        <line x1="5" y1="8" x2="35" y2="15" stroke="currentColor" stroke-width="1.5"
                                            stroke-dasharray="2,2" />
                                        <line x1="5" y1="22" x2="35" y2="15" stroke="currentColor" stroke-width="1.5"
                                            stroke-dasharray="2,2" />
                                        <polyline points="5,12 12,20 18,10 24,18 30,14" fill="none"
                                            stroke="currentColor" stroke-width="2" />
                                    </svg>
                                </div>
                                <span>三角收斂</span>
                            </label>
                        </div>
                    </div>
                    <div class="filter-section">
                        <label class="filter-label">識別靈敏度</label>
                        <div class="range-wrapper">
                            <input type="range" class="range-input" min="0" max="100" value="75" id="sensitivityRange">
                            <div class="range-labels">
                                <span>低</span>
                                <span class="range-value" id="sensitivityValue">75%</span>
                                <span>高</span>
                            </div>
                        </div>
                    </div>
                    <div class="filter-section">
                        <label class="filter-label">時間週期設定</label>
                        <div class="pattern-timeframe-row">
                            <div class="pattern-timeframe-main">
                                <div class="pattern-timeframe-field">
                                    <label class="filter-label pattern-timeframe-label">最小長度</label>
                                    <input type="number" class="select-input" id="patternBarsMin" value="20" min="5"
                                        max="200">
                                </div>
                                <div class="pattern-timeframe-field">
                                    <label class="filter-label pattern-timeframe-label">最大長度</label>
                                    <input type="number" class="select-input" id="patternBarsMax" value="60" min="5"
                                        max="200">
                                </div>
                            </div>
                            <div class="pattern-timeframe-field">
                                <label class="filter-label pattern-timeframe-label">時間間隔</label>
                                <select class="select-input" id="patternTimeInterval">
                                    <option value="1min">1分鐘</option>
                                    <option value="3min">3分鐘</option>
                                    <option value="5min">5分鐘</option>
                                    <option value="15min">15分鐘</option>
                                    <option value="30min">30分鐘</option>
                                    <option value="1H">1小時</option>
                                    <option value="4H">4小時</option>
                                    <option value="1D" selected>日線</option>
                                    <option value="1W">週線</option>
                                    <option value="1M">月線</option>
                                </select>
                            </div>
                        </div>
                        <div class="pattern-timeframe-note">
                            例如：檢測<span id="barsMinPreview">20</span>根~<span id="barsMaxPreview">60</span>根(<span
                                id="intervalPreview">日線</span>)
                        </div>
                    </div>
                </section>

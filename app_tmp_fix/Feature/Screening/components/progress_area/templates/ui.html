<!-- 停止篩選可移動提示視窗 -->
<div id="stopFilterDialog" class="stop-dialog-window" style="display:none;" role="dialog" aria-modal="true">
    <div class="stop-dialog-header" id="stopDialogHeader">
        <span class="stop-dialog-title">確認停止篩選</span>
        <button type="button" id="btnCloseStopDialog" class="stop-dialog-close" title="關閉" aria-label="關閉">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
    <div class="stop-dialog-body">
        <p class="stop-dialog-desc">篩選尚未執行完成，請確定是否停止篩選</p>
        <label class="stop-dialog-checkbox-label">
            <input type="checkbox" id="cbShowPartialResults">
            <span>顯示已執行完成的結果</span>
        </label>
    </div>
    <div class="stop-dialog-footer">
        <button type="button" id="btnConfirmStop" class="btn-dialog-confirm">確定</button>
        <button type="button" id="btnCancelStop" class="btn-dialog-cancel">取消</button>
    </div>
</div>
